services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/models
      - ./apps/backend:/app
    networks:
      - rag-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    volumes:
      # Mount individual directories instead of entire /app to preserve node_modules
      - ./apps/frontend/app:/app/app
      - ./apps/frontend/components:/app/components
      - ./apps/frontend/contexts:/app/contexts
      - ./apps/frontend/hooks:/app/hooks
      - ./apps/frontend/lib:/app/lib
      - ./apps/frontend/public:/app/public
      - /app/node_modules
    networks:
      - rag-network
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

networks:
  rag-network:
    driver: bridge
