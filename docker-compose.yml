services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_api_key_here}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
    volumes:
      - ./models:/models
      - ./apps/backend:/app
    env_file:
      - ./apps/backend/.env
    networks:
      - rag-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - rag-network
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

networks:
  rag-network:
    driver: bridge
