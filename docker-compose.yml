services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODELS_PATH=/models
    volumes:
      - ./models:/models
      - ./apps/backend/db.sqlite3:/app/db.sqlite3
      - ./apps/backend/chroma_db:/app/chroma_db
    networks:
      - rag-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    networks:
      - rag-network
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production

networks:
  rag-network:
    driver: bridge
